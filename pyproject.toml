[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sinan-captcha"
version = "0.1.0"
description = "Training and data engineering workspace for graphical captcha models."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
sinan-dataset-validate = "core.dataset.cli:main"
sinan-materials-build = "core.materials.cli:main"
sinan-train-group1 = "core.train.group1.cli:main"
sinan-train-group2 = "core.train.group2.cli:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
where = ["."]
include = ["core*"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
testpaths = ["tests/python"]
pythonpath = ["."]
addopts = "-q"

[tool.mypy]
python_version = "3.11"
packages = ["core"]
strict = true
warn_unused_configs = true

[dependency-groups]
dev = []
