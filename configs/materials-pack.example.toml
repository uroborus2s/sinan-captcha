# Build a local offline materials pack for the Go generator.
# Backgrounds are downloaded into <output-root>/backgrounds/.
# Icons are extracted into <output-root>/icons/<class_name>/.
# Classes are written to <output-root>/manifests/classes.yaml.

[backgrounds]
provider = "pexels"
api_key_env = "PEXELS_API_KEY"
queries = ["mountain lake", "bridge valley", "indoor room", "city street"]
per_query = 8
orientation = "landscape"

[icons]
provider = "google_material_design_icons"
archive_url = "https://github.com/google/material-design-icons/archive/refs/heads/master.zip"

[[classes]]
id = 0
name = "icon_phone"
zh_name = "电话"
source_icons = ["call", "phone_in_talk"]

[[classes]]
id = 1
name = "icon_satellite"
zh_name = "卫星"
source_icons = ["satellite_alt"]

[[classes]]
id = 2
name = "icon_plane"
zh_name = "飞机"
source_icons = ["flight", "airplanemode_active"]

[[classes]]
id = 3
name = "icon_boat"
zh_name = "船"
source_icons = ["directions_boat", "sailing"]
