# Build a local offline materials pack for the Go generator.
# Backgrounds are downloaded into <output-root>/backgrounds/.
# Group1 click icons are extracted into <output-root>/group1/icons/<class_name>/.
# Group2 gap shapes are extracted into <output-root>/group2/shapes/<shape_name>/.
# Manifests are written into <output-root>/manifests/materials.yaml,
# <output-root>/manifests/group1.classes.yaml, and <output-root>/manifests/group2.shapes.yaml.

[backgrounds]
provider = "pexels"
api_key_env = "PEXELS_API_KEY"
queries = ["mountain lake", "bridge valley", "indoor room", "city street"]
per_query = 8
orientation = "landscape"

[group1]
provider = "google_material_design_icons"
archive_url = "https://github.com/google/material-design-icons/archive/refs/heads/master.zip"

[[group1.classes]]
id = 0
name = "icon_phone"
zh_name = "电话"
source_icons = ["call", "phone_in_talk"]

[[group1.classes]]
id = 1
name = "icon_satellite"
zh_name = "卫星"
source_icons = ["satellite_alt"]

[group2]
provider = "google_material_design_icons"
archive_url = "https://github.com/google/material-design-icons/archive/refs/heads/master.zip"

[[group2.shapes]]
id = 0
name = "shape_badge"
zh_name = "徽章缺口"
source_icons = ["award_star"]

[[group2.shapes]]
id = 1
name = "shape_shield"
zh_name = "盾牌缺口"
source_icons = ["shield"]
