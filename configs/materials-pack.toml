# Real materials pack spec for the first training round.
# Group1 click classes and Group2 gap shapes use separate source pools.

[backgrounds]
provider = "pexels"
api_key_env = "PEXELS_API_KEY"
queries = [
  "mountain lake",
  "forest trail",
  "river bridge",
  "coast harbor",
  "city street",
  "urban plaza",
  "office lobby",
  "shopping mall interior",
  "cafe interior",
  "library interior",
  "living room",
  "kitchen interior",
  "bedroom interior",
  "study desk",
  "warehouse interior",
  "subway station",
  "airport terminal",
  "museum hall",
  "park pathway",
  "autumn garden",
  "snow village",
  "desert road",
  "seaside boardwalk",
  "residential corridor",
]
per_query = 30
orientation = "landscape"

[group1]
provider = "google_material_design_icons"
archive_url = "https://github.com/google/material-design-icons/archive/refs/heads/master.zip"

[[group1.classes]]
